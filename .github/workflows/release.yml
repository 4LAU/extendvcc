name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            artifact: extendvcc-macos-arm64
          - os: macos-13
            arch: x86_64
            artifact: extendvcc-macos-x86_64
          - os: ubuntu-latest
            arch: x86_64
            artifact: extendvcc-linux-x86_64
          - os: windows-latest
            arch: x86_64
            artifact: extendvcc-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyinstaller
      - run: pip install -e .
      - run: pyinstaller --onefile --name ${{ matrix.artifact }} --strip src/extendvcc/cli.py
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: extendvcc-*
          generate_release_notes: true
